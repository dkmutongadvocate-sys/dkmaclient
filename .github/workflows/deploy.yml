name: Build & Deploy DKMA Client Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug — verify file and secrets
        run: |
          echo "--- Files in root ---"
          ls -la
          echo "--- Placeholders in index.html ---"
          grep -o '%%[^%]*%%' index.html | sort | uniq || echo "No placeholders found"
          echo "--- SUPABASE_URL secret ---"
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "MISSING"; else echo "SET ($(echo '${{ secrets.SUPABASE_URL }}' | wc -c) chars)"; fi
          echo "--- SUPABASE_ANON_KEY secret ---"
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then echo "MISSING"; else echo "SET ($(echo '${{ secrets.SUPABASE_ANON_KEY }}' | wc -c) chars)"; fi

      - name: Inject Supabase credentials
        run: |
          sed -i "s|%%SUPABASE_URL%%|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|%%SUPABASE_ANON_KEY%%|${{ secrets.SUPABASE_ANON_KEY }}|g" index.html
          echo "--- Post-injection check ---"
          grep -o '%%[^%]*%%' index.html && echo "WARNING: placeholders still present!" || echo "OK — all replaced"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
