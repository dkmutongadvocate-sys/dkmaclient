name: Build & Deploy DKMA Client Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Inject secrets
        run: |
          sed -i "s|%%SUPABASE_URL%%|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|%%SUPABASE_ANON_KEY%%|${{ secrets.SUPABASE_ANON_KEY }}|g" index.html
          sed -i "s|%%LAWYER_PHONE%%|${{ secrets.LAWYER_PHONE }}|g" index.html
          echo "Secrets injected"

      - name: Verify no placeholders remain
        run: |
          if grep -q '%%SUPABASE_URL%%\|%%SUPABASE_ANON_KEY%%\|%%LAWYER_PHONE%%' index.html; then
            echo "ERROR: Unreplaced placeholders found"
            grep -n '%%SUPABASE_URL%%\|%%SUPABASE_ANON_KEY%%\|%%LAWYER_PHONE%%' index.html
            exit 1
          fi
          echo "All placeholders replaced successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
